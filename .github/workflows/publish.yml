name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            suffix: .exe
          - os: ubuntu-latest
            rid: linux-x64
            suffix: ''
          - os: macos-latest
            rid: osx-arm64
            suffix: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: dotnet publish -r ${{ matrix.rid }} -c Release --no-restore
      - uses: actions/upload-artifact@v4
        with:
          name: OracleClient-${{ matrix.rid }}
          path: bin/Release/net9.0/${{ matrix.rid }}/publish/

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Organize artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          for dir in OracleClient-*/; do
            dir=${dir%/}
            rid=${dir#OracleClient-}
            find "$dir" -type f -exec cp {} "release-assets/OracleClient-${rid}$([[ $rid == win-* ]] && echo '.exe')" \;
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
